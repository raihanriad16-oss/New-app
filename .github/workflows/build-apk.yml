name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Pinned: AGP 8.5.2 + Kotlin Gradle plugin 1.9.24 (used for kapt/Hilt) are only
      # compatible up to Gradle 8.x. Letting this float to the runner's default Gradle
      # (9.x) breaks kapt with a NoSuchMethodError on Configuration.fileCollection(Spec),
      # which was removed in Gradle 9. Do not bump this without also bumping AGP/Kotlin.
      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BusinessAccounting-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
